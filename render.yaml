services:
  - type: web
    name: msa-organizer
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: msa-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
